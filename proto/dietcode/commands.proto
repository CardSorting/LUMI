syntax = "proto3";

package dietcode;

import "dietcode/common.proto";

option go_package = "github.com/dietcode/grpc-go/dietcode";
option java_multiple_files = true;
option java_package = "bot.dietcode.proto";

// Service for running IDE commands, for example context menu actions,
// commands, etc.
// In contrast to the rest of the ProtoBus services, these are
// intended to be called by the IDE directly instead of through the webview,
// because they are triggered by interactions in the IDE.
service CommandsService {
  rpc addToDietCode(CommandContext) returns (Empty);
  rpc fixWithDietCode(CommandContext) returns (Empty);
  rpc explainWithDietCode(CommandContext) returns (Empty);
  rpc improveWithDietCode(CommandContext) returns (Empty);
}

message CommandContext {
  // The absolute path of the current file.
  optional string file_path = 1;
  // The selected source text.
  optional string selected_text = 2;
  // The language identifier for the current file.
  optional string language = 3;
  // Any diagnostic problems for the current file.
  repeated dietcode.Diagnostic diagnostics = 4;
}
