name: Package Extension

# OpenSSF Scorecard packaging + signed-releases: build VSIX on tag push and attach cosign signatures.
on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: package-extension-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-targets:
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        name: Package (${{ matrix.os }})
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: |
                      package-lock.json
                      webview-ui/package-lock.json

            - name: Install dependencies
              run: |
                  npm ci
                  cd webview-ui && npm ci

            - name: Install native protoc on Apple Silicon
              if: runner.os == 'macOS' && runner.arch == 'ARM64'
              run: brew install protobuf

            - name: Package VSIX
              run: npm run package:vsix:all

            - name: Upload targeted VSIX
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: vsix-${{ runner.os }}-${{ runner.arch }}
                  path: dist/*.vsix
                  if-no-files-found: error

    release:
        needs: build-targets
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Download targeted VSIX packages
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  pattern: vsix-*
                  path: dist
                  merge-multiple: true

            - name: Install cosign
              uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

            - name: Sign release artifacts
              run: |
                  for vsix in dist/lumi-vscode-*.vsix dist/lumi-[0-9]*.vsix; do
                    [ -f "$vsix" ] || continue
                    cosign sign-blob --yes --output-signature "${vsix}.sig" --output-certificate "${vsix}.pem" "$vsix"
                  done

            - name: Publish GitHub Release assets
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
              with:
                  files: |
                      dist/lumi-vscode-*.vsix
                      dist/lumi-[0-9]*.vsix
                      dist/*.sig
                      dist/*.pem
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
