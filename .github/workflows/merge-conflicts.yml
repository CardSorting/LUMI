name: Merge Conflicts

on:
  pull_request_target:
    types: [synchronize, opened, reopened]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: eps1lon/actions-label-merge-conflict@0273be72a0bbd58fcd71d0d6c02c209b50d1e5e1 # v3
        with:
          dirtyLabel: conflicts
          removeOnDirty: false
          afterCleanDelay: 5
          repoToken: ${{ secrets.GITHUB_TOKEN }}
