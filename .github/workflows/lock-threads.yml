name: Lock Threads

on:
  schedule:
    - cron: "0 6 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@1bf7ec25051fe7c00bdd17e6a7cf3d7bfb7dc771 # v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-inactive-days: 30
          pr-inactive-days: 30
          issue-comment: >
            This issue has been automatically locked because it has been inactive for 30 days.
            Please open a new issue with updated details if this still applies to LUMI.
          pr-comment: >
            This pull request has been automatically locked because it has been inactive for 30 days.
