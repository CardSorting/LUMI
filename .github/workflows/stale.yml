# This workflow will only label and/or close 30 issues at a time in order to avoid exceeding a rate limit.
# More info: https://docs.github.com/en/actions/use-cases-and-examples/project-management/closing-inactive-issues
name: Close inactive issues
on:
    schedule:
        - cron: "30 1 * * *"

permissions:
    contents: read

jobs:
    close-issues:
        runs-on: ubuntu-latest
        permissions:
            issues: write
            pull-requests: write
        steps:
            - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
              with:
                  days-before-issue-stale: 60
                  days-before-issue-close: 14
                  stale-issue-label: "stale"
                  stale-issue-message: "This issue has been inactive for 60 days. If it still applies, comment or remove the `stale` label; otherwise it will close in 14 days."
                  close-issue-message: "Closed due to inactivity. Reopen with updated details if this still affects LUMI."
                  days-before-pr-stale: -1
                  days-before-pr-close: -1
                  exempt-issue-labels: "pinned,security,governed-execution,triage,documentation,good first issue"
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
