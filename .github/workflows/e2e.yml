name: E2E Tests

on:
    push:
        branches:
            - main
    pull_request:
        types: [opened, reopened, synchronize, ready_for_review]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - uses: actions/checkout@v7
            - uses: dorny/paths-filter@v4
              id: filter
              with:
                  filters: |
                      code:
                        - '**'
                        - '!**/*.md'
                        - '!**/*.mdx'
                        - '!docs/**'
                        - '!CHANGELOG.md'
                        - '!locales/**'
                        - '!.github/**'
                        - '!.wiki/**'

    matrix_prep:
        needs: changes
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.set-matrix.outputs.matrix }}
        steps:
            - id: set-matrix
              run: |
                  echo 'matrix=[{"runner":"ubuntu"},{"runner":"windows"},{"runner":"macos"}]' >> $GITHUB_OUTPUT

    e2e:
        needs: [changes, matrix_prep]
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || needs.changes.outputs.code == 'true'
        strategy:
            fail-fast: false
            matrix:
                include: ${{ fromJson(needs.matrix_prep.outputs.matrix) }}
        runs-on: ${{ matrix.runner }}-latest
        timeout-minutes: 20
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v7
            - name: Setup Node.js environment
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            # Cache root dependencies - only reuse if package-lock.json exactly matches
            - name: Cache root dependencies
              uses: actions/cache@v6
              id: root-cache
              with:
                  path: node_modules
                  key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

            # Cache webview-ui dependencies - only reuse if package-lock.json exactly matches
            - name: Cache webview-ui dependencies
              uses: actions/cache@v6
              id: webview-cache
              with:
                  path: webview-ui/node_modules
                  key: ${{ runner.os }}-npm-webview-${{ hashFiles('webview-ui/package-lock.json') }}

            # Cache VS Code installation
            - name: Cache VS Code
              uses: actions/cache@v6
              id: vscode-cache
              with:
                  path: .vscode-test
                  key: vscode-${{ runner.os }}-stable-${{ hashFiles('.vscode-test.mjs', 'package.json') }}
                  restore-keys: |
                      vscode-${{ runner.os }}-stable-

            # Cache Playwright browsers
            - name: Cache Playwright browsers
              uses: actions/cache@v6
              id: playwright-cache
              with:
                  path: |
                      ~/.cache/ms-playwright
                      ~/Library/Caches/ms-playwright
                      ~/AppData/Local/ms-playwright
                  key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      playwright-browsers-${{ runner.os }}-

            - name: Install root dependencies
              run: npm ci
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install webview-ui dependencies
              run: cd webview-ui && npm ci

            - name: Install vsce
              run: npm install -g @vscode/vsce

            - name: Install xvfb on Linux
              if: matrix.runner == 'ubuntu'
              run: sudo apt-get update && sudo apt-get install -y xvfb

            # Run optimized E2E tests (eliminates redundant builds)
            - name: Run E2E tests - Linux
              if: matrix.runner == 'ubuntu'
              run: xvfb-run -a npm run test:e2e:optimal

            - name: Run E2E tests - Non-Linux
              if: matrix.runner != 'ubuntu'
              run: npm run test:e2e:optimal

            - uses: actions/upload-artifact@v7
              if: ${{ failure() }}
              with:
                  name: playwright-recordings-${{ matrix.runner }}
                  path: |
                      test-results/playwright/
