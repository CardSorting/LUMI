version: 2
updates:
    # GitHub Actions (security patches only via grouped weekly PR)
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      open-pull-requests-limit: 5
      labels:
          - dependencies
          - ci
      commit-message:
          prefix: "ci"
          include: scope
      groups:
          github-actions:
              patterns:
                  - "*"

    # Main extension dependencies
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      open-pull-requests-limit: 5
      labels:
          - dependencies
      commit-message:
          prefix: "chore"
          include: scope
      groups:
          all-dependencies:
              patterns:
                  - "*"
      ignore:
          - dependency-name: "*"
            update-types:
                - "version-update:semver-major"
                - "version-update:semver-minor"
                - "version-update:semver-patch"

    # Webview UI dependencies
    - package-ecosystem: "npm"
      directory: "/webview-ui"
      schedule:
          interval: "weekly"
      open-pull-requests-limit: 5
      labels:
          - dependencies
          - webview
      commit-message:
          prefix: "chore"
          include: scope
      groups:
          all-dependencies:
              patterns:
                  - "*"
      ignore:
          - dependency-name: "@testing-library/*"
          - dependency-name: "*"
            update-types:
                - "version-update:semver-major"
                - "version-update:semver-minor"
                - "version-update:semver-patch"

    # BroccoliDB substrate package
    - package-ecosystem: "npm"
      directory: "/broccolidb"
      schedule:
          interval: "weekly"
      open-pull-requests-limit: 5
      labels:
          - dependencies
          - broccolidb
      commit-message:
          prefix: "chore"
          include: scope
      groups:
          all-dependencies:
              patterns:
                  - "*"
      ignore:
          - dependency-name: "*"
            update-types:
                - "version-update:semver-major"
                - "version-update:semver-minor"
                - "version-update:semver-patch"
