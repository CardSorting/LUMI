name: Bug report
description: Something is broken in LUMI or governed swarm execution
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Search [existing issues](https://github.com/CardSorting/LUMI/issues) first.

        **Security issues:** do not use this form — see [SECURITY.md](https://github.com/CardSorting/LUMI/blob/main/SECURITY.md).

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of LUMI is affected?
      options:
        - Chat / task loop
        - Tool approval / diff view
        - Plan or Act mode
        - MCP integration
        - Governed subagents / merge gate
        - Roadmap projection / patches
        - BroccoliDB / cognitive memory
        - Webview UI
        - Extension activation / performance
        - Other
    validations:
      required: true

  - type: input
    id: lumi-version
    attributes:
      label: LUMI version
      description: Extension version from Settings or `package.json` (current release is 2.1.3)
      placeholder: "e.g. 2.1.3"
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      placeholder: "e.g. 1.96.0"
    validations:
      required: true

  - type: input
    id: provider-model
    attributes:
      label: Provider / model
      description: Plan or Act provider in use when the issue occurred
      placeholder: "e.g. openrouter / anthropic/claude-sonnet-4"
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or receipt artifacts
      description: Output from **LUMI → Output** panel, or path to `subagent_executions/*.governed.*` if swarm-related
      placeholder: Paste relevant log lines or attach redacted receipt JSON
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for duplicates
          required: true
        - label: I can reproduce on the latest release (or main branch)
          required: false
